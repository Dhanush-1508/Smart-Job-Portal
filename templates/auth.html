{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireHub</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body data-active-tab="{{ active_tab|default:'login' }}">

<section class="auth-section">

    <div class="auth-bg-gradient"></div>
    <div class="auth-bg-dots"></div>
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>

    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-briefcase-fill"></i>
            </div>
            <h1 id="pageTitle">Welcome Back</h1>
            <p id="pageSubtitle">Sign in to continue to HireHub</p>
        </div>

        <div class="auth-tabs">
            <button type="button" class="tab-btn active" data-tab="login">Login</button>
            <button type="button" class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form" method="POST" action="{% url 'auth' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="loginEmail" name="username" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-pass" data-target="loginPassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn primary">
                Sign In <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="auth-form" method="POST" action="{% url 'auth' %}" style="display:none;">
            {% csrf_token %}
            <input type="hidden" name="action" value="signup">

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                    <i class="bi bi-telephone"></i>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                </div>
            </div>

            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="signupPassword" name="password" placeholder="Create a password" required minlength="6">
                    <button type="button" class="toggle-pass" data-target="signupPassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm your password" required>
                    <button type="button" class="toggle-pass" data-target="confirmPassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <label class="remember terms">
                <input type="checkbox" id="terms" required>
                <span>I agree to the <a href="#">Terms & Conditions</a></span>
            </label>

            <button type="submit" class="auth-btn primary">
                Create Account <i class="bi bi-arrow-right"></i>
            </button>
        </form>

    </div>
</section>

<script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
